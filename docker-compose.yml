services:
  app:
    build: .
    container_name: volvo-xc70-wiring
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_PATH: /app/data/wiring.sqlite
      EWD_DATA_DIR: /app/data/ewd
      CLIENT_DIST: /app/client/dist
      MANUAL_DIR: ${MANUAL_DIR:-/data/manual}
      EWD_SOURCE_DIR: ${EWD_SOURCE_DIR:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    volumes:
      # Persist SQLite + EWD JSON indexes across restarts
      - ./data:/app/data
      # Optional host paths for PDF manuals / raw SVG tree
      - ${MANUAL_HOST_DIR:-./manual}:/data/manual:ro
    restart: unless-stopped
